<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80f0ff" />
      <stop offset="40%" stop-color="#00bfff" />
      <stop offset="100%" stop-color="#0055ff" />
    </linearGradient>
    
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#001133" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <text x="20" y="85" 
          font-family="'Montserrat', 'Arial Black', sans-serif" 
          font-size="90" 
          font-weight="900" 
          fill="url(#blueGrad)" 
          stroke="#002266" 
          stroke-width="3"
          letter-spacing="-2">{</text>

    <text x="65" y="80" 
          font-family="'Montserrat', 'Arial Black', sans-serif" 
          font-size="75" 
          font-weight="900" 
          font-style="italic"
          fill="url(#blueGrad)" 
          stroke="#002266" 
          stroke-width="3"
          letter-spacing="-1">NicosDev</text>

    <text x="440" y="85" 
          font-family="'Montserrat', 'Arial Black', sans-serif" 
          font-size="90" 
          font-weight="900" 
          fill="url(#blueGrad)" 
          stroke="#002266" 
          stroke-width="3"
          letter-spacing="-2">}</text>
  </g>
</svg>
